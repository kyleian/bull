name: Scheduled Scan

on:
  # Runs at 4:15 PM ET (21:15 UTC) every weekday — after market close
  schedule:
    - cron: "15 21 * * 1-5"
  # Manual trigger with mode and output selection
  workflow_dispatch:
    inputs:
      scan_mode:
        description: "Scan mode"
        required: false
        default: "all"
        type: choice
        options: [all, bullish, bearish, neutral]
      output_format:
        description: "Output format"
        required: false
        default: "email"
        type: choice
        options: [console, email, json]

jobs:
  scan:
    name: Run ${{ github.event.inputs.scan_mode || 'all' }} scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Run scan
        env:
          BULL_SCAN_MODE: ${{ github.event.inputs.scan_mode || 'all' }}
          BULL_OUTPUT_FORMAT: ${{ github.event.inputs.output_format || 'email' }}
          BULL_GMAIL_ADDRESS: ${{ secrets.BULL_GMAIL_ADDRESS }}
          BULL_GMAIL_APP_PASSWORD: ${{ secrets.BULL_GMAIL_APP_PASSWORD }}
          BULL_TO_EMAIL: ${{ secrets.BULL_TO_EMAIL }}
        run: bull scan --mode ${{ github.event.inputs.scan_mode || 'all' }} --output ${{ github.event.inputs.output_format || 'email' }}
